<!DOCTYPE html>

<head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="windowLogic.js" defer></script>
</head>

<body style="font-family: Palatino URW Palladio L, serif; background-image: url(./img/testbackground.png); background-size: cover;">
    <div id="OStopBar">
        <div id="OStopBarVisual"style="display: flex; justify-content: flex-start; position: relative; width: 100%; height:6%; background-color: rgb(225, 225, 225); color: #000; margin-top: -1%; margin-left: -0.65%; border-radius: 8px 8px 0 0; gap: 16px; padding-left: 16px;">
            <div style="cursor: pointer; display: flex;">
                <p id="RetroButton" style="padding:0; display:inline;">
                    RetroOS
                </p>
            </div>

            <p>
                File
            </p>

            <p>
                Edit
            </p>

            <p>
                Window
            </p>

            <p id="timeElement" style="position: absolute; padding-left: 1150px;">
                6:07 PM
            </p>
        </div>
        <script>
            setInterval(function() {var getTime = new Date().toLocaleTimeString("en-US", {hour: '2-digit', minute: '2-digit', hour12: true}); var selectBar = document.querySelector("#timeElement");   timeElement.innerHTML = getTime;}, 1000);  //Condensed time updater
        </script>
    </div>

    <div id="welcomeWindow" style="border: solid; width:500; border-radius:8px; padding: 16px; position: absolute; top: 60%; left: 50%; width: 500px; height: 800px; background-color:azure;">
        <div id="welcomeTopBar" style="background-color:#bebebe; border-radius: 8px; margin-top: -12px; width: 110%; width: 102.5%; left: 50%; transform: translateX(-1.25%);">
            <div style="background-color:rgb(225, 25, 65); width: 20px;">       
              <p id="welcomeClose" style="cursor: pointer;">x</p>
            </div>
        </div>

        <h1>Welcome to RetroOS!</h1>
        <h2 style="margin-top: -10px;">A retro-inspired webOS</h2>
        <h3><em></em>Welcome to RetroOS!  Not much has been implemented yet, but I am working on adding more.  I credit the system background to Apple.</em></h3>

        <header>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Computer_macintosh_128k%2C_1984_%28all_about_Apple_onlus%29.jpg/1920px-Computer_macintosh_128k%2C_1984_%28all_about_Apple_onlus%29.jpg" height="500" width="500"/>
        </header>

        <a href="https://stardance.hackclub.com/home"><h2>Stardance website</h2></a>
    </div>

    <div id="demoApplication" style="display: none; border: solid; border-radius:8px; padding: 16px; position: absolute; top: 60%; left: 50%; width: 300px; height: 216px; background-color:azure;">
        <div id="demoTopBar" style="background-color:#bebebe; border-radius: 8px; margin-top: -12px; width: 110%; width: 102.5%; left: 50%; transform: translateX(-1.25%);">
            <div style="background-color:rgb(225, 25, 65); width: 20px;">       
              <p id="demoClose" style="cursor: pointer;">x</p>
            </div>
        </div>

        <h1>Change system settings</h1>

        <button id="themeButton"><h2>Dark/light theme</h2></button>

        <script>
            document.getElementById("OStopBarVisual").style.backgroundColor = "#4A4A4A";
            var theme = "light";

            document.getElementById("themeButton").addEventListener("click", function() {
                console.log("Pressed");
                
                if (theme == "light") {
                    document.getElementById("OStopBarVisual").style.backgroundColor = "#4A4A4A";
                    theme = "dark";
                } else {
                    document.getElementById("OStopBarVisual").style.backgroundColor = "#898989";
                    theme = "light";
                }
            });
        </script>
    </div>

    <div id="desktopApps" style="padding-top: 64px; padding-left: 16px;">
        <div id="demoIcon" class="selected" style="display: inline; text-align: center; width: fit-content;">
            <img src="img/demoApp_ICON.png" style="width: 64px; height: 64px; border-radius: 8px;"/>
            <p style="color:rgb(255, 255, 255); margin-left: -95%">Control Panel</p>
        </div>
    </div>
</body>
